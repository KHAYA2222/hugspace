name: hugspace
description: A warm anonymous space to share feelings and receive hugs.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.0

  # UI & Animations
  google_fonts: ^6.1.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2
  flutter_staggered_animations: ^1.1.1
  confetti: ^0.7.0

  # Utils
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  timeago: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/animations/
